name: Build and push Docker image

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # lets you trigger manually from the Actions tab

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/hpa-final:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/hpa-final:${{ github.sha }}

      - name: Smoke test the image
        run: |
          echo "Pulling back the image we just pushed..."
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/hpa-final:latest
          mkdir -p /tmp/in /tmp/out
          cp inputs/grid-6-7.txt /tmp/in/
          docker run --rm \
            -v /tmp/in:/input \
            -v /tmp/out:/output \
            ${{ secrets.DOCKERHUB_USERNAME }}/hpa-final:latest \
            /input/grid-6-7.txt /output/grid-6-7.out
          echo "Output:"
          cat /tmp/out/grid-6-7.out
